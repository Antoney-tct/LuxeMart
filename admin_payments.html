<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>LuxeMart Admin - M-Pesa Transactions</title>
    <link rel="stylesheet" href="css/main.css">
    <style>
        .admin-container { padding: 2rem; max-width: 1200px; margin: 0 auto; }
        .status-pill { padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; }
        .status-success { background: #dcfce7; color: #166534; }
        .status-error { background: #fee2e2; color: #991b1b; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: var(--card-bg); }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--border); }
    </style>
</head>
<body>
    <div class="admin-container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>M-Pesa Payment Logs</h1>
            <button onclick="fetchLogs()" class="btn-primary">Refresh Data</button>
        </header>

        <table>
            <thead>
                <tr>
                    <th>Date/Time</th>
                    <th>Receipt</th>
                    <th>Phone</th>
                    <th>Amount</th>
                    <th>Status</th>
                    <th>Checkout Request ID</th>
                </tr>
            </thead>
            <tbody id="logsTableBody">
                <tr><td colspan="6" style="text-align:center;">Loading transactions...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        async function fetchLogs() {
            const tbody = document.getElementById('logsTableBody');
            try {
                const response = await fetch('api/admin/get_mpesa_logs.php');
                const data = await response.json();

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No transactions found.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(tx => `
                    <tr>
                        <td>${tx.timestamp}</td>
                        <td><strong>${tx.receipt}</strong></td>
                        <td>${tx.phone}</td>
                        <td>KSh ${tx.amount}</td>
                        <td>
                            <span class="status-pill ${tx.resultCode === 0 ? 'status-success' : 'status-error'}">
                                ${tx.resultCode === 0 ? 'Success' : 'Failed/Cancelled'}
                            </span>
                            <br><small style="color:#666">${tx.resultDesc}</small>
                        </td>
                        <td style="font-family: monospace; font-size: 0.8rem;">${tx.checkoutID}</td>
                    </tr>
                `).join('');
            } catch (error) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Error loading logs.</td></tr>';
            }
        }

        // Initial load
        fetchLogs();
        // Auto-refresh every 30 seconds
        setInterval(fetchLogs, 30000);
    </script>
</body>
</html>
