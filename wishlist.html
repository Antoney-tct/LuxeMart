<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Wishlist - LuxeMart</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="logo" style="display: flex; align-items: center; gap: 10px;">
                <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="LuxeMart" style="height: 40px; width: auto;">
                <span style="font-family: 'Playfair Display', serif; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px; color: #333;">LuxeMart</span>
            </div>
            <nav class="nav-desktop">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="categories.html">Categories</a>
                <a href="sale.html">Sale</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="nav-actions">
                <button class="icon-btn" id="searchBtn"><i class="fas fa-search"></i></button>
                <button class="icon-btn" id="cartBtn"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCount">0</span></button>
                <a href="wishlist.html" class="icon-btn" id="wishlistNavBtn" aria-label="My Wishlist">
                    <i class="fas fa-heart"></i>
                    <span class="cart-count" id="wishlistCount">0</span>
                </a>
                <div class="account-dropdown">
                    <button class="icon-btn" aria-label="My Account"><i class="fas fa-user"></i></button>
                    <div class="account-dropdown-menu">
                        <a href="#" id="accountLink">My Account</a>
                        <a href="seller.html">My Shop</a>
                        <a href="#" id="logoutLink">Logout</a>
                    </div>
                </div>
                <button class="mobile-menu-toggle" aria-label="Open Menu" aria-expanded="false">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </div>
    </header>

    <div class="mobile-menu" id="mobileMenu">
        <button class="mobile-menu-close" id="closeMenu" aria-label="Close menu"><i class="fas fa-times"></i></button>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="shop.html">Shop</a></li>
            <li><a href="categories.html">Categories</a></li>
            <li><a href="sale.html">Sale</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
        <div class="nav-actions">
            <button class="icon-btn" id="mobileSearchBtn">
                <i class="fas fa-search"></i> Search
            </button>
            <button class="icon-btn" id="mobileCartBtn">
                <i class="fas fa-shopping-bag"></i> Cart (<span id="mobileCartCount">0</span>)
            </button>
            <button class="icon-btn" id="themeToggle">
                <i class="fas fa-moon"></i> Theme
            </button>
        </div>
    </div>

    <main class="page-content">
        <div class="container">
            <div class="wishlist-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>My Wishlist</h1>
                <button id="addAllToCartBtn" class="btn-primary" style="display: none;">Add All to Cart</button>
            </div>
            <div class="products-grid" id="wishlistGrid">
                <!-- Wishlist items will be loaded here -->
            </div>
        </div>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header"><h3 class="cart-title">Shopping Cart</h3><button class="modal-close" id="closeCart">×</button></div>
        <div id="cartItems"></div>
        <div class="cart-total">Total: <span id="cartTotal">KSh 0.00</span></div>
        <div class="cart-actions"><a href="checkout.html" class="btn-primary">Checkout</a></div>
    </div>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 LuxeMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/common.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/wishlist.js"></script>
</body>
</html>
