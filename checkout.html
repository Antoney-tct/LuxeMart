<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - LuxeMart</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .checkout-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 3rem; margin-top: 2rem; }
        .checkout-form .form-group { margin-bottom: 1.5rem; }
        .checkout-form label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .checkout-form input, .checkout-form select { width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 1rem; }
        .order-summary { background: var(--accent); padding: 2rem; border-radius: 16px; position: sticky; top: 100px; }
        .summary-item { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .summary-img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; }
        .summary-info { flex: 1; }
        .summary-total { display: flex; justify-content: space-between; font-weight: 700; font-size: 1.25rem; margin-top: 1.5rem; border-top: 2px solid var(--border); padding-top: 1rem; }
        .payment-method-options { display: flex; gap: 1rem; border: 1px solid var(--border); border-radius: 8px; padding: 0.5rem; }
        .payment-option { flex: 1; }
        .payment-option input[type="radio"] { display: none; }
        .payment-option-label { display: flex; align-items: center; justify-content: center; gap: 0.75rem; padding: 0.75rem; border-radius: 6px; cursor: pointer; transition: all 0.2s ease; border: 2px solid transparent; font-weight: 500; }
        .payment-option input[type="radio"]:checked + .payment-option-label { background-color: #fff5f0; border-color: var(--secondary); color: var(--secondary); }
        .discount-form { display: flex; gap: 0.5rem; margin-top: 1.5rem; } .discount-form input { margin-bottom: 0; }
        @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="logo" style="display: flex; align-items: center; gap: 10px;">
                <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="LuxeMart" style="height: 40px; width: auto;">
                <span style="font-family: 'Playfair Display', serif; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px; color: #333;">LuxeMart</span>
            </div>
            <nav class="nav-desktop">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <button class="icon-btn" id="themeToggle" aria-label="Toggle theme" style="margin-left: auto;">
                    <i class="fas fa-moon"></i>
                </button>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="container">
            <h1>Checkout</h1>
            <div class="checkout-grid">
                <!-- Billing Form -->
                <div class="checkout-form">
                    <h3>Billing Details</h3>
                    <form id="checkoutForm">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" required placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" required placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" required placeholder="123 Fashion St">
                        </div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <div class="form-group">
                                <label>City</label>
                                <input type="text" required>
                            </div>
                            <div class="form-group">
                                <label>Zip Code</label>
                                <input type="text" required>
                            </div>
                        </div>
                        <h3>Payment Information</h3>
                        <!-- Payment Method Selection -->
                        <div class="form-group">
                            <div class="payment-method-options">
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="card" checked>
                                    <span class="payment-option-label">
                                        <i class="fas fa-credit-card"></i> Card Payment
                                    </span>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="mpesa">
                                    <span class="payment-option-label">
                                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/15/M-PESA_LOGO-01.svg/1200px-M-PESA_LOGO-01.svg.png" alt="M-Pesa" style="height: 18px;"> M-Pesa
                                    </span>
                                </label>
                                <label class="payment-option">
                                    <input type="radio" name="paymentMethod" value="paypal">
                                    <span class="payment-option-label">
                                        <i class="fab fa-paypal"></i> PayPal
                                    </span>
                                </label>
                            </div>
                        </div>

                        <!-- Card Details -->
                        <div id="cardPaymentFields">
                            <div class="form-group">
                                <label>Card Number</label>
                                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000">
                            </div>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                                <div class="form-group">
                                    <label>Expiry Date</label>
                                    <input type="text" id="cardExpiry" placeholder="MM/YY">
                                </div>
                                <div class="form-group">
                                    <label>CVV</label>
                                    <input type="text" id="cardCvv" placeholder="123">
                                </div>
                            </div>
                        </div>

                        <!-- M-Pesa Details -->
                        <div id="mpesaPaymentFields" style="display: none;">
                            <div class="form-group">
                                <label for="mpesaPhone">M-Pesa Phone Number</label>
                                <input type="tel" id="mpesaPhone" placeholder="e.g., 0712345678">
                                <small style="font-size: 0.8rem; color: #666; margin-top: 4px; display: block;">A payment prompt will be sent to this number.</small>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Place Order</button>
                    </form>
                </div>

                <!-- Order Summary -->
                <div class="order-summary">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <h3 style="margin-bottom: 0;">Order Summary</h3>
                        <button id="clearCartBtn" style="background: none; border: none; color: #ef4444; font-size: 0.9rem; cursor: pointer; text-decoration: underline; padding: 0;">Clear Cart</button>
                    </div>
                    <div id="checkoutItems">
                        <!-- Items injected via JS -->
                    </div>
                    <div class="discount-form">
                        <input type="text" id="discountCode" placeholder="Discount Code">
                        <button type="button" id="applyDiscountBtn" class="btn-primary" style="white-space: nowrap;">Apply</button>
                    </div>
                    <div class="summary-total">
                        <span>Total</span>
                        <span id="checkoutTotal">KSh 0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2025 LuxeMart. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/common.js"></script>
    <script src="js/checkout.js"></script>
</body>
</html>
