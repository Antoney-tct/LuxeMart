<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxeMart Chatbot</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/chatbot.css">
</head>
<body>
    <div class="chatbot-container">
        <div class="chat-header">
            <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="LuxeMart" class="logo">
            <h2>LuxeMart Support Bot</h2>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                Hello! How can I assist you today?
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="messageInput" placeholder="Type your message here...">
            <button id="sendButton"><i class="fas fa-paper-plane"></i> Send</button>
        </div>
    </div>
    <audio id="notificationSound" preload="auto">
        <source src="sounds/notification.mp3" type="audio/mp3">
        Your browser does not support the audio element.
    </audio>
    <script src="js/chatbot.js"></script>
</body>
</html>
