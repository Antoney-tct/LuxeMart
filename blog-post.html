<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post - LuxeMart</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="logo" style="display: flex; align-items: center; gap: 10px;">
                <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="LuxeMart" style="height: 40px; width: auto;">
                <span style="font-family: 'Playfair Display', serif; font-weight: 800; font-size: 1.6rem; letter-spacing: -0.5px; color: #333;">LuxeMart</span>
            </div>
            <nav class="nav-desktop">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="categories.html">Categories</a>
                <a href="sale.html">Sale</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div class="nav-actions">
                <button class="icon-btn" id="searchBtn"><i class="fas fa-search"></i></button>
                <a href="wishlist.html" class="icon-btn" id="wishlistNavBtn"><i class="fas fa-heart"></i><span class="cart-count" id="wishlistCount">0</span></a>
                <button class="icon-btn" id="cartBtn"><i class="fas fa-shopping-bag"></i><span class="cart-count" id="cartCount">0</span></button>
                <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
                <button class="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="page-content">
        <div class="container" id="blogPostContainer">
            <!-- Skeleton Loader -->
            <div class="blog-post-skeleton">
                <div class="skeleton" style="height: 40px; width: 70%; margin: 0 auto 1rem;"></div>
                <div class="skeleton" style="height: 20px; width: 40%; margin: 0 auto 2rem;"></div>
                <div class="skeleton" style="height: 450px; width: 100%; margin-bottom: 2rem;"></div>
                <div class="skeleton" style="height: 20px; width: 100%;"></div>
                <div class="skeleton" style="height: 20px; width: 100%; margin-top: 1rem;"></div>
                <div class="skeleton" style="height: 20px; width: 80%; margin-top: 1rem;"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="footer-bottom"><p>&copy; 2025 LuxeMart. All rights reserved.</p></div>
        </div>
    </footer>

    <script src="js/blog-data.js"></script>
    <script src="js/common.js"></script>
    <script src="js/blog-post-page.js"></script>
</body>
</html>
