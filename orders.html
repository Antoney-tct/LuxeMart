<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Orders — LuxeMart</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3081/3081559.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
        --primary:   #1a1a1a;
        --secondary: #ff6b35;
        --sec-dark:  #e55a2b;
        --accent:    #f8f7f4;
        --text:      #1a1a1a;
        --muted:     #6b7280;
        --white:     #ffffff;
        --border:    #e5e7eb;
        --success:   #10b981;
        --danger:    #ef4444;
        --warning:   #f59e0b;
        --info:      #3b82f6;
        --shadow-sm: 0 1px 4px rgba(0,0,0,0.07);
        --shadow-md: 0 4px 20px rgba(0,0,0,0.09);
        --shadow-lg: 0 12px 40px rgba(0,0,0,0.13);
        --radius-sm: 8px;
        --radius-md: 14px;
        --radius-lg: 20px;
        --nav-h:     68px;
        --ease:      cubic-bezier(.4,0,.2,1);
        --dur:       0.22s;
    }

    body[data-theme="dark"] {
        --primary:   #f9fafb;
        --accent:    #1f2937;
        --text:      #e5e7eb;
        --muted:     #9ca3af;
        --white:     #111827;
        --border:    #374151;
    }

    html { scroll-behavior:smooth; }

    body {
        font-family: 'Inter', sans-serif;
        color: var(--text);
        background: var(--accent);
        line-height: 1.6;
        min-height: 100vh;
    }

    a { text-decoration:none; color:inherit; }
    img { max-width:100%; display:block; }
    button { cursor:pointer; font-family:inherit; border:none; }

    .container { width:100%; max-width:1100px; margin:0 auto; padding:0 1.25rem; }

    /* ── HEADER ──────────────────────────────────────── */
    header {
        position: fixed;
        top:0; left:0; width:100%;
        height: var(--nav-h);
        background: rgba(255,255,255,0.94);
        backdrop-filter: blur(16px);
        border-bottom: 1px solid rgba(229,231,235,0.6);
        z-index: 1000;
        box-shadow: var(--shadow-sm);
    }

    body[data-theme="dark"] header { background:rgba(17,24,39,0.94); }

    .header-inner {
        height:100%;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:1rem;
    }

    .logo { display:flex; align-items:center; gap:0.6rem; }
    .logo img { width:34px; height:34px; }
    .logo-text { font-family:'Playfair Display',serif; font-size:1.45rem; font-weight:700; color:var(--text); }

    .nav-links { display:flex; align-items:center; gap:0.5rem; }

    .nav-link {
        padding: 0.45rem 0.8rem;
        border-radius: var(--radius-sm);
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--muted);
        transition: all var(--dur) var(--ease);
    }

    .nav-link:hover,
    .nav-link.active { color:var(--text); background:var(--accent); }

    .nav-actions { display:flex; align-items:center; gap:0.4rem; }

    .nav-icon-btn {
        width:38px; height:38px;
        border-radius:var(--radius-sm);
        background:transparent;
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:0.95rem;
        color:var(--muted);
        transition:all var(--dur) var(--ease);
        position:relative;
    }

    .nav-icon-btn:hover { background:var(--accent); color:var(--text); }

    .nav-badge {
        position:absolute;
        top:3px; right:3px;
        background:var(--secondary);
        color:white;
        font-size:0.58rem;
        font-weight:700;
        width:15px; height:15px;
        border-radius:50%;
        display:flex;
        align-items:center;
        justify-content:center;
    }

    /* ── PAGE HERO ───────────────────────────────────── */
    .page-hero {
        margin-top: var(--nav-h);
        background: linear-gradient(135deg, #1a1a1a 0%, #2c1810 50%, #1a1a1a 100%);
        padding: 2.5rem 0;
        position: relative;
        overflow: hidden;
    }

    .page-hero::before {
        content:'';
        position:absolute;
        inset:0;
        background: radial-gradient(ellipse at 20% 50%, rgba(255,107,53,0.1) 0%, transparent 60%);
        pointer-events:none;
    }

    .page-hero-inner {
        position:relative;
        z-index:1;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:1.5rem;
        flex-wrap:wrap;
    }

    .page-hero h1 {
        font-family:'Playfair Display',serif;
        font-size:clamp(1.6rem, 3vw, 2.2rem);
        color:white;
        margin-bottom:0.3rem;
    }

    .page-hero p { color:rgba(255,255,255,0.6); font-size:0.9rem; }

    /* ── CONTENT ─────────────────────────────────────── */
    .page-content { padding:2rem 0 4rem; }

    /* ── FILTERS ─────────────────────────────────────── */
    .orders-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
    }

    .filter-tabs {
        display: flex;
        gap: 0.35rem;
        flex-wrap: wrap;
    }

    .filter-tab {
        padding: 0.45rem 1rem;
        border-radius: 50px;
        font-size: 0.82rem;
        font-weight: 600;
        border: 1.5px solid var(--border);
        background: var(--white);
        color: var(--muted);
        transition: all var(--dur) var(--ease);
        cursor: pointer;
    }

    .filter-tab:hover { border-color:var(--secondary); color:var(--secondary); }

    .filter-tab.active {
        background: var(--secondary);
        color: white;
        border-color: var(--secondary);
    }

    .orders-search {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: var(--white);
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        padding: 0 0.875rem;
        height: 36px;
    }

    .orders-search input {
        border:none;
        background:none;
        font-size:0.82rem;
        color:var(--text);
        width:180px;
        outline:none;
    }

    .orders-search input::placeholder { color:var(--muted); }
    .orders-search i { color:var(--muted); font-size:0.8rem; }

    /* Date filters */
    .date-filters {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
    }

    .date-label { font-size:0.78rem; color:var(--muted); font-weight:500; }

    .date-input {
        height: 34px;
        padding: 0 0.75rem;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.82rem;
        color: var(--text);
        background: var(--white);
        outline: none;
        transition: border-color var(--dur) var(--ease);
        font-family: inherit;
    }

    .date-input:focus { border-color:var(--secondary); }

    .btn-clear-dates {
        height: 34px;
        padding: 0 0.875rem;
        border: 1.5px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.78rem;
        font-weight: 600;
        background: var(--white);
        color: var(--muted);
        transition: all var(--dur) var(--ease);
    }

    .btn-clear-dates:hover { color:var(--secondary); border-color:var(--secondary); }

    /* ── ORDER CARD ──────────────────────────────────── */
    .order-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        overflow: hidden;
        margin-bottom: 1.25rem;
        transition: box-shadow var(--dur) var(--ease);
    }

    .order-card:hover { box-shadow:var(--shadow-md); }

    .order-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 1.25rem;
        background: var(--accent);
        border-bottom: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 0.75rem;
    }

    .order-head-left { display:flex; flex-direction:column; gap:0.2rem; }

    .order-number {
        font-weight: 700;
        font-size: 0.95rem;
        font-family: 'Inter', monospace;
        letter-spacing: 0.3px;
    }

    .order-date { font-size:0.78rem; color:var(--muted); }

    .order-head-right { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; }

    /* Status badge */
    .status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        padding: 4px 12px;
        border-radius: 50px;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.3px;
    }

    .status-badge::before {
        content:'';
        width:6px; height:6px;
        border-radius:50%;
        background:currentColor;
        flex-shrink:0;
    }

    .status-processing { background:#dbeafe; color:#1d4ed8; }
    .status-shipped    { background:#fef3c7; color:#d97706; }
    .status-delivered  { background:#d1fae5; color:#065f46; }
    .status-cancelled  { background:#fee2e2; color:#991b1b; }

    .cancel-btn {
        height: 28px;
        padding: 0 0.75rem;
        border-radius: 50px;
        font-size: 0.72rem;
        font-weight: 700;
        border: 1.5px solid var(--danger);
        color: var(--danger);
        background: none;
        transition: all var(--dur) var(--ease);
    }

    .cancel-btn:hover { background:var(--danger); color:white; }

    /* Tracking bar */
    .tracking-bar {
        padding: 1.1rem 1.25rem;
        border-bottom: 1px solid var(--border);
    }

    .track-steps {
        display: flex;
        align-items: center;
        position: relative;
    }

    .track-line {
        position: absolute;
        top: 16px;
        left: 24px;
        right: 24px;
        height: 2px;
        background: var(--border);
        z-index: 0;
    }

    .track-line-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--success), #34d399);
        border-radius: 1px;
        transition: width 0.6s var(--ease);
    }

    .track-step {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        position: relative;
        z-index: 1;
    }

    .track-icon {
        width: 32px; height: 32px;
        border-radius: 50%;
        background: var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.78rem;
        color: var(--muted);
        border: 2px solid var(--white);
        transition: all 0.4s var(--ease);
    }

    .track-step.done .track-icon {
        background: var(--success);
        color: white;
    }

    .track-step.active .track-icon {
        background: var(--secondary);
        color: white;
        box-shadow: 0 0 0 4px rgba(255,107,53,0.2);
    }

    .track-label {
        font-size: 0.68rem;
        font-weight: 600;
        color: var(--muted);
        text-align: center;
    }

    .track-step.done .track-label,
    .track-step.active .track-label { color:var(--text); }

    .cancelled-bar {
        display: flex;
        align-items: center;
        gap: 0.625rem;
        color: var(--danger);
        font-size: 0.875rem;
        font-weight: 600;
    }

    /* Order items */
    .order-items { padding:0 1.25rem; }

    .order-item {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.875rem 0;
        border-bottom: 1px solid var(--border);
    }

    .order-item:last-child { border-bottom:none; }

    .order-item-img {
        width: 56px; height: 56px;
        border-radius: var(--radius-sm);
        object-fit: cover;
        border: 1px solid var(--border);
        flex-shrink: 0;
    }

    .order-item-info { flex:1; min-width:0; }

    .order-item-name {
        font-weight: 600;
        font-size: 0.875rem;
        margin-bottom: 0.2rem;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .order-item-meta { font-size:0.75rem; color:var(--muted); }

    .order-item-price {
        font-weight: 700;
        font-size: 0.9rem;
        white-space: nowrap;
    }

    /* Order footer */
    .order-foot {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.875rem 1.25rem;
        background: var(--accent);
        border-top: 1px solid var(--border);
        flex-wrap: wrap;
        gap: 0.75rem;
    }

    .order-foot-meta {
        display: flex;
        align-items: center;
        gap: 1rem;
        font-size: 0.78rem;
        color: var(--muted);
        flex-wrap: wrap;
    }

    .order-foot-meta span { display:flex; align-items:center; gap:0.3rem; }
    .order-foot-meta i { font-size:0.7rem; }

    .order-total { font-weight:800; font-size:1rem; }

    /* ── EMPTY STATE ─────────────────────────────────── */
    .empty-state {
        text-align: center;
        padding: 4rem 1.5rem;
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
    }

    .empty-state-icon {
        width: 80px; height: 80px;
        border-radius: 50%;
        background: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
    }

    .empty-state-icon i { font-size:2rem; color:var(--muted); opacity:0.5; }
    .empty-state h3 { font-size:1.2rem; margin-bottom:0.5rem; }
    .empty-state p  { color:var(--muted); margin-bottom:1.5rem; font-size:0.9rem; }

    .btn-shop {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.7rem 1.5rem;
        background: var(--secondary);
        color: white;
        border-radius: 50px;
        font-weight: 700;
        font-size: 0.875rem;
        transition: background var(--dur) var(--ease);
    }

    .btn-shop:hover { background:var(--sec-dark); }

    /* ── SKELETON ────────────────────────────────────── */
    .skeleton {
        background: linear-gradient(90deg, var(--accent) 25%, var(--border) 50%, var(--accent) 75%);
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: var(--radius-sm);
    }

    @keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

    /* ── TOAST ───────────────────────────────────────── */
    .toast-container {
        position:fixed;
        bottom:1.5rem; left:50%;
        transform:translateX(-50%);
        z-index:2000;
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:0.5rem;
        pointer-events:none;
    }

    .toast {
        background:var(--white);
        border:1px solid var(--border);
        border-radius:var(--radius-md);
        padding:0.7rem 1.1rem;
        box-shadow:var(--shadow-lg);
        display:flex;
        align-items:center;
        gap:0.5rem;
        font-size:0.85rem;
        font-weight:500;
        min-width:220px;
        animation:toastIn 0.3s var(--ease);
        transition:opacity 0.3s;
    }

    .toast.success { border-left:4px solid var(--success); }
    .toast.success i { color:var(--success); }
    .toast.error   { border-left:4px solid var(--danger); }
    .toast.error   i { color:var(--danger); }
    .toast.info    { border-left:4px solid var(--info); }
    .toast.info    i { color:var(--info); }

    @keyframes toastIn { from{transform:translateY(10px);opacity:0;} to{transform:translateY(0);opacity:1;} }

    /* ── RESPONSIVE ──────────────────────────────────── */
    @media (max-width:768px) {
        .nav-links { display:none; }
        .orders-search input { width:140px; }
        .track-label { display:none; }
    }

    @media (max-width:480px) {
        .filter-tabs { gap:0.25rem; }
        .filter-tab  { padding:0.35rem 0.75rem; font-size:0.75rem; }
        .orders-search { display:none; }
    }
    </style>
</head>
<body>

<!-- ── HEADER ────────────────────────────────────────────── -->
<header>
    <div class="container header-inner">
        <a href="index.html" class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/3081/3081559.png" alt="LuxeMart">
            <span class="logo-text">LuxeMart</span>
        </a>
        <nav class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="shop.html"  class="nav-link">Shop</a>
            <a href="orders.html" class="nav-link active">My Orders</a>
        </nav>
        <div class="nav-actions">
            <button class="nav-icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <a href="wishlist.html" class="nav-icon-btn">
                <i class="fas fa-heart"></i>
                <span class="nav-badge" id="wishlistCount">0</span>
            </a>
            <button class="nav-icon-btn" id="cartBtn">
                <i class="fas fa-shopping-bag"></i>
                <span class="nav-badge" id="cartCount">0</span>
            </button>
        </div>
    </div>
</header>

<!-- ── PAGE HERO ─────────────────────────────────────────── -->
<div class="page-hero">
    <div class="container page-hero-inner">
        <div>
            <h1>My Orders</h1>
            <p>Track your purchases and view order history.</p>
        </div>
        <a href="shop.html" style="display:inline-flex;align-items:center;gap:0.5rem;padding:0.625rem 1.25rem;background:rgba(255,255,255,0.1);color:white;border-radius:50px;font-size:0.82rem;font-weight:600;border:1px solid rgba(255,255,255,0.2);transition:all 0.2s;">
            <i class="fas fa-plus"></i> Continue Shopping
        </a>
    </div>
</div>

<!-- ── MAIN ──────────────────────────────────────────────── -->
<main class="page-content">
    <div class="container">

        <!-- Toolbar -->
        <div class="orders-toolbar">
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All Orders</button>
                <button class="filter-tab" data-filter="processing">Processing</button>
                <button class="filter-tab" data-filter="shipped">Shipped</button>
                <button class="filter-tab" data-filter="delivered">Delivered</button>
                <button class="filter-tab" data-filter="cancelled">Cancelled</button>
            </div>
            <div class="orders-search">
                <i class="fas fa-search"></i>
                <input type="text" id="orderSearch" placeholder="Search orders...">
            </div>
        </div>

        <!-- Date filters -->
        <div class="date-filters">
            <span class="date-label">Date range:</span>
            <input type="date" id="startDate" class="date-input">
            <span class="date-label">to</span>
            <input type="date" id="endDate" class="date-input">
            <button class="btn-clear-dates" id="clearDatesBtn">Clear</button>
        </div>

        <!-- Orders list -->
        <div id="ordersList">
            <!-- Skeletons -->
            <div class="order-card">
                <div class="order-head" style="background:transparent;">
                    <div style="display:flex;flex-direction:column;gap:0.4rem;flex:1;">
                        <div class="skeleton" style="height:14px;width:160px;"></div>
                        <div class="skeleton" style="height:11px;width:100px;"></div>
                    </div>
                    <div class="skeleton" style="height:24px;width:90px;border-radius:50px;"></div>
                </div>
                <div class="order-items">
                    <div class="order-item">
                        <div class="skeleton" style="width:56px;height:56px;flex-shrink:0;border-radius:8px;"></div>
                        <div style="flex:1;display:flex;flex-direction:column;gap:0.4rem;">
                            <div class="skeleton" style="height:12px;width:70%;"></div>
                            <div class="skeleton" style="height:10px;width:40%;"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="order-card">
                <div class="order-head" style="background:transparent;">
                    <div style="display:flex;flex-direction:column;gap:0.4rem;flex:1;">
                        <div class="skeleton" style="height:14px;width:160px;"></div>
                        <div class="skeleton" style="height:11px;width:100px;"></div>
                    </div>
                    <div class="skeleton" style="height:24px;width:90px;border-radius:50px;"></div>
                </div>
                <div class="order-items">
                    <div class="order-item">
                        <div class="skeleton" style="width:56px;height:56px;flex-shrink:0;border-radius:8px;"></div>
                        <div style="flex:1;display:flex;flex-direction:column;gap:0.4rem;">
                            <div class="skeleton" style="height:12px;width:70%;"></div>
                            <div class="skeleton" style="height:10px;width:40%;"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</main>

<!-- Cart sidebar (minimal) -->
<div id="cartSidebar" style="position:fixed;top:0;right:-100%;width:min(400px,100vw);height:100vh;background:var(--white);z-index:1200;box-shadow:var(--shadow-lg);transition:right 0.35s var(--ease);display:flex;flex-direction:column;">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);">
        <h3 style="font-weight:700;font-size:1rem;">Shopping Cart</h3>
        <button id="closeCart" style="width:30px;height:30px;border-radius:8px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--muted);"><i class="fas fa-times"></i></button>
    </div>
    <div id="cartItems" style="flex:1;overflow-y:auto;padding:1rem 1.5rem;"></div>
    <div style="padding:1.25rem 1.5rem;border-top:1px solid var(--border);">
        <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem;margin-bottom:1rem;">
            <span>Total</span><span id="cartTotal">KSh 0.00</span>
        </div>
        <a href="checkout.html" style="display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.7rem;background:var(--secondary);color:white;border-radius:8px;font-weight:700;font-size:0.875rem;">
            <i class="fas fa-lock"></i> Checkout
        </a>
    </div>
</div>
<div id="cartOverlay" style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1150;display:none;"></div>

<div id="toastContainer" class="toast-container"></div>

<script src="js/products.js"></script>
<script src="js/common.js"></script>
<script src="js/cart.js"></script>
<script src="js/orders.js"></script>
<script>
(function(){
    // Theme
    const applyTheme = (t) => {
        document.body.setAttribute('data-theme', t);
        localStorage.setItem('theme', t);
        const i = document.querySelector('#themeToggle i');
        if(i) i.className = `fas ${t==='dark'?'fa-sun':'fa-moon'}`;
    };
    applyTheme(localStorage.getItem('theme') || 'light');
    document.getElementById('themeToggle')?.addEventListener('click', () =>
        applyTheme(localStorage.getItem('theme')==='dark' ? 'light' : 'dark')
    );

    // Cart sidebar
    const sidebar  = document.getElementById('cartSidebar');
    const overlay  = document.getElementById('cartOverlay');
    const cartBtn  = document.getElementById('cartBtn');
    const closeBtn = document.getElementById('closeCart');
    cartBtn?.addEventListener('click',  () => { sidebar.style.right='0'; overlay.style.display='block'; document.body.style.overflow='hidden'; if(typeof window.fetchCart==='function') window.fetchCart(); });
    closeBtn?.addEventListener('click', () => { sidebar.style.right='-100%'; overlay.style.display='none'; document.body.style.overflow=''; });
    overlay?.addEventListener('click',  () => { sidebar.style.right='-100%'; overlay.style.display='none'; document.body.style.overflow=''; });
})();
</script>
</body>
</html>
